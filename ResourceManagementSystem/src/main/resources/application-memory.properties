# =====================================================
# Memory & GC Configuration for Skill Gap Matching Engine
# =====================================================

# JVM Memory Settings (Production)
# Recommended: -Xms1g -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200

# Garbage Collection Optimization
# G1GC is recommended for production workloads
# -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=16m

# Memory Profile Estimation for Skill Gap Analysis:
# - 50 resource skills: ~50 * 200 bytes = 10KB
# - 20 requirements: ~20 * 300 bytes = 6KB  
# - 5 certificates: ~5 * 150 bytes = 750B
# - Total per analysis: ~17KB (well within limits)
# - 100 concurrent analyses: ~1.7MB (safe)

# Spring Boot Memory Configuration
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.max-connections=8192

# Cache Memory Management
# Redis cache prevents memory leaks in application
spring.cache.redis.cache-null-values=false

# Monitoring Memory Usage
management.endpoint.health.show-details=when-authorized
management.health.memory.enabled=true

# =====================================================
# Cache Configuration for Skill Gap Matching Engine
# =====================================================

# Enable Caching
spring.cache.type=redis

# Redis Configuration (Production)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0
spring.redis.jedis.pool.max-wait=-1ms

# Cache TTL Configuration
app.cache.proficiency-levels.ttl=24h
app.cache.skills.ttl=12h
app.cache.sub-skills.ttl=12h
app.cache.certificates.ttl=6h
app.cache.role-expectations.ttl=2h

# Cache Statistics
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=skill-matching:
spring.cache.redis.use-key-prefix=true
spring.cache.redis.time-to-live=3600000

# Development Profile (In-memory Cache)
# Uncomment below for development without Redis
spring.cache.type=simple
spring.cache.cache-names=proficiencyLevels,skills,subSkills,certificates,deliveryRoleExpectations

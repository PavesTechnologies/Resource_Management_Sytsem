# =====================================================
# Future-Proofing Configuration for Skill Gap Matching Engine
# =====================================================

# Skill Matching Configuration (Externalized thresholds for extensibility)
skill.match.recency.high=5
skill.match.recency.medium=3
skill.match.recency.low=2

# Scoring Weights (For future weighted scoring implementation)
skill.match.weight.proficiency=0.4
skill.match.weight.recency=0.3
skill.match.weight.experience=0.3

# AI Integration (Future AI scoring layer)
skill.match.ai.enabled=false
skill.match.ai.endpoint=
skill.match.ai.timeout=5000

# Performance Thresholds
skill.match.slow-query-threshold-ms=200
skill.match.max-concurrent-requests=100

# Extension Points Configuration
skill.match.extension.weighted-scoring.enabled=false
skill.match.extension.experience-based.enabled=false
skill.match.extension.ai-scoring.enabled=false

# Monitoring Extensions
skill.match.metrics.detailed=false
skill.match.metrics.trace-performance=false

# Future Database Optimization
skill.match.db.partitioning.enabled=false
skill.match.db.read-replica.enabled=false

# =====================================================
# Production-Ready Configuration for Skill Gap Matching Engine
# =====================================================

# Enable Caching
spring.cache.type=redis

# Redis Configuration (Production)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0
spring.redis.jedis.pool.max-wait=-1ms

# Cache TTL Configuration (Production-optimized)
app.cache.proficiency-levels.ttl=12h
app.cache.skills.ttl=12h
app.cache.sub-skills.ttl=12h
app.cache.certificates.ttl=6h
app.cache.role-expectations.ttl=2h

# Cache Statistics
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=skill-matching:
spring.cache.redis.use-key-prefix=true
spring.cache.redis.time-to-live=3600000

# HikariCP Connection Pool (Optimized for 500 users, 50 concurrent allocations)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# Performance Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Logging Configuration
logging.level.com.service_imple.allocation_service_imple=DEBUG
logging.level.com.controller.allocation_controllers=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n

# Skill Gap Matching Configuration (Externalized thresholds)
skill.match.recency.high=5
skill.match.recency.medium=3
skill.match.recency.low=2
skill.match.slow-query-threshold-ms=200
skill.match.max-concurrent-requests=100

# Development Profile (In-memory Cache)
# Uncomment below for development without Redis
spring.cache.type=simple
spring.cache.cache-names=proficiencyLevels,skills,subSkills,certificates,deliveryRoleExpectations
